    <script>
function setupToggle(buttonId, wrapperId) {

    const btn = document.getElementById(buttonId);
    const wrapper = document.getElementById(wrapperId);

    btn.addEventListener("click", () => {

        const expanded = wrapper.classList.toggle("expanded");

        btn.innerHTML = expanded
//            ? "View Less ↑"
//            : "View More ↓";
         ? "  ↑"
            : "  ↓";

    });
}

/* Initialize */
setupToggle("KPItoggleBtn", "KPIcardWrapper");
setupToggle("ChartstoggleBtn", "ChartscardWrapper");
            
</script>
    
    


    

    <script>
    document.querySelectorAll(".carousel-wrapper").forEach(wrapper => {

  const carousel = wrapper.querySelector(".Carousel-Items-Container");
  const leftBtn = wrapper.querySelector(".btn-left");
  const rightBtn = wrapper.querySelector(".btn-right");

  function updateArrows() {
    const scrollLeft = carousel.scrollLeft;
    const maxScrollLeft = carousel.scrollWidth - carousel.clientWidth;

    // Left button
    leftBtn.style.display = scrollLeft <= 0 ? "none" : "flex";

    // Right button
    rightBtn.style.display =
      scrollLeft >= maxScrollLeft - 1 ? "none" : "flex";
  }

  // Scroll left
  leftBtn.addEventListener("click", () => {
    carousel.scrollBy({
      left: -320,
      behavior: "smooth"
    });
  });

  // Scroll right
  rightBtn.addEventListener("click", () => {
    carousel.scrollBy({
      left: 320,
      behavior: "smooth"
    });
  });

  // Events
  carousel.addEventListener("scroll", updateArrows);
  window.addEventListener("resize", updateArrows);

  // Initial check
  updateArrows();
});
    </script>
